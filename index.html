<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#f2f0e9" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Trainer" />
  <title>Trainer</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- SVG defs (gradients used by rings) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#869a76" />
        <stop offset="100%" stop-color="#c6b48f" />
      </linearGradient>
    </defs>
  </svg>

  <main id="app">
    <!-- ===== TODAY ===== -->
    <section id="screen-today" class="screen active">
      <header class="top">
        <div>
          <div class="greeting" id="greeting">Good morning</div>
          <div class="date-line" id="date-line"></div>
        </div>
        <button class="streak-chip" id="streak-chip" aria-label="Current streak">
          <span class="flame">🔥</span><span id="streak-num">0</span>
        </button>
      </header>
      <div id="today-content"><!-- filled by app.js --></div>
    </section>

    <!-- ===== SCHEDULE ===== -->
    <section id="screen-schedule" class="screen">
      <header class="top"><div><div class="greeting"><b>Your program</b></div><div class="date-line">4-week block · Mon / Wed / Fri</div></div></header>
      <div id="schedule-content"></div>
    </section>

    <!-- ===== CHAT ===== -->
    <section id="screen-chat" class="screen">
      <header class="top"><div><div class="greeting"><b>Coach</b></div><div class="date-line" id="coach-status">Ask about your plan or how a session felt</div></div></header>
      <div class="chat-wrap" id="chat-log"></div>
      <div class="chat-input-bar">
        <input id="chat-input" type="text" placeholder="Message your coach…" autocomplete="off" />
        <button class="send-btn" id="chat-send" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
      </div>
    </section>

    <!-- ===== PROFILE ===== -->
    <section id="screen-me" class="screen">
      <header class="top"><div><div class="greeting"><b>Profile</b></div></div></header>
      <div id="me-content"></div>
    </section>
  </main>

  <!-- ===== Bottom nav ===== -->
  <nav class="nav" id="nav">
    <button data-screen="today" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>
      Today
    </button>
    <button data-screen="schedule">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>
      Schedule
    </button>
    <button data-screen="chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a3 3 0 0 1-3 3H8l-5 4V6a3 3 0 0 1 3-3h12a3 3 0 0 1 3 3z"/></svg>
      Coach
    </button>
    <button data-screen="me">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      Me
    </button>
  </nav>

  <!-- ===== Onboarding sheet ===== -->
  <div class="sheet-backdrop" id="sheet-backdrop">
    <div class="sheet" id="sheet"></div>
  </div>

  <canvas id="confetti" aria-hidden="true"></canvas>
  <div class="toast" id="toast"></div>

  <script src="config.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
